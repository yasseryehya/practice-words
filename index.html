<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعلم القراءة</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Amiri', serif;
            background-color: #fcfcfc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 800px;
            width: 95%;
        }

        .word-display {
            font-size: 130px;
            color: #2c3e50;
            margin-bottom: 40px;
            cursor: pointer;
            transition: transform 0.2s, color 0.3s;
            user-select: none;
        }

        .word-display:hover { color: #3498db; }
        .word-display:active { transform: scale(0.95); }

        .options-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease;
        }

        .options-container.visible {
            opacity: 1;
            visibility: visible;
        }

        .option-card {
            border: 4px solid #eee;
            border-radius: 20px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #fff;
        }

        .option-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
        }

        .option-card:hover {
            border-color: #3498db;
            transform: translateY(-5px);
        }

        .correct {
            border-color: #2ecc71 !important;
            background-color: #eafaf1;
            transform: scale(1.05) !important;
        }

        .disabled { pointer-events: none; }

        @media (max-width: 600px) {
            .options-container { grid-template-columns: 1fr; }
            .word-display { font-size: 90px; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="word-display" id="main-word" onclick="showOptions()">...</div>
    <div class="options-container" id="options"></div>
</div>

<script>
    // ضع روابط الصور الخاصة بك هنا مباشرة
    const data = [
        { word: "خبز", vocalized: "خُبْزٌ", image: "https://images.pexels.com/photos/209206/pexels-photo-209206.jpeg?auto=compress&cs=tinysrgb&w=400" },
        { word: "ماء", vocalized: "مَاءٌ", image: "https://images.pexels.com/photos/416528/pexels-photo-416528.jpeg?auto=compress&cs=tinysrgb&w=400" },
        { word: "بيت", vocalized: "بَيْتٌ", image: "https://images.pexels.com/photos/106399/pexels-photo-106399.jpeg?auto=compress&cs=tinysrgb&w=400" },
        { word: "تفاحة", vocalized: "تُفَّاحَةٌ", image: "https://images.pexels.com/photos/102104/pexels-photo-102104.jpeg?auto=compress&cs=tinysrgb&w=400" },
        { word: "شجرة", vocalized: "شَجَرَةٌ", image: "https://images.pexels.com/photos/189349/pexels-photo-189349.jpeg?auto=compress&cs=tinysrgb&w=400" },
        { word: "سيارة", vocalized: "سَيَّارَةٌ", image: "https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg?auto=compress&cs=tinysrgb&w=400" },
        { word: "كرسي", vocalized: "كُرْسِيٌّ", image: "https://images.pexels.com/photos/116910/pexels-photo-116910.jpeg?auto=compress&cs=tinysrgb&w=400" }
    ];

    let currentWordObj = {};

    function speakWord() {
        if (!currentWordObj.vocalized) return;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(currentWordObj.vocalized);
        msg.lang = 'ar-SA';
        msg.rate = 0.7;
        window.speechSynthesis.speak(msg);
    }

    function loadNewRound() {
        const optionsContainer = document.getElementById('options');
        optionsContainer.classList.remove('visible', 'disabled');
        optionsContainer.innerHTML = '';

        // اختيار الكلمة الحالية
        currentWordObj = data[Math.floor(Math.random() * data.length)];
        document.getElementById('main-word').innerText = currentWordObj.word;

        // اختيار خيارين خاطئين
        let others = data.filter(item => item.word !== currentWordObj.word);
        others.sort(() => Math.random() - 0.5);
        
        const options = [currentWordObj, others[0], others[1]].sort(() => Math.random() - 0.5);

        options.forEach(opt => {
            const card = document.createElement('div');
            card.className = 'option-card';
            card.innerHTML = `<img src="${opt.image}" alt="">`;
            card.onclick = () => checkAnswer(opt.word, card);
            optionsContainer.appendChild(card);
        });
    }

    function showOptions() {
        document.getElementById('options').classList.add('visible');
    }

    function checkAnswer(selectedWord, cardElement) {
        if (selectedWord === currentWordObj.word) {
            cardElement.classList.add('correct');
            document.getElementById('options').classList.add('disabled');
            speakWord();
            setTimeout(loadNewRound, 2000);
        } else {
            cardElement.style.borderColor = '#ff7675';
            setTimeout(() => cardElement.style.borderColor = '#eee', 500);
        }
    }

    window.onload = loadNewRound;
</script>

</body>
</html>
