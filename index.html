<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برنامج القراءة التفاعلي</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM Plex Sans Arabic:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3498db;
            --text: #2c3e50;
            --bg: #fdfdfd;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'IBM Plex Sans Arabic', serif;
            background-color: var(--bg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        #menu-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 20px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 600px;
            width: 100%;
        }

        .menu-btn {
            padding: 25px;
            font-size: 26px;
            background: white;
            border: 3px solid var(--primary);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'IBM Plex Sans Arabic', serif;
            color: var(--primary);
        }

        .menu-btn:hover { background: var(--primary); color: white; }

        #game-screen {
            position: relative;
            height: 100%;
            width: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .header-info {
            position: absolute;
            top: 40px;
            font-size: 24px;
            color: #95a5a6;
            text-align: center;
            width: 100%;
        }

        .word-display {
            font-size: clamp(80px, 15vw, 180px);
            color: var(--text);
            cursor: pointer;
            transition: transform 0.1s, color 0.3s;
            text-align: center;
            padding: 20px;
            line-height: 1.2;
        }

        .word-display:active { transform: scale(0.9); color: var(--primary); }

        .footer-nav {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
        }

        .btn-back {
            padding: 10px 30px;
            font-size: 20px;
            background: none;
            border: 2px solid #bdc3c7;
            border-radius: 50px;
            color: #7f8c8d;
            cursor: pointer;
            font-family: 'IBM Plex Sans Arabic', serif;
        }

        .fade-in { animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="menu-screen">
    <h1 style="font-size: 36px; margin-bottom: 40px; color: var(--text);">اختر نوع الكلمات</h1>
    <div class="menu-grid">
        <button class="menu-btn" onclick="startSession('actions')">أفعال</button>
        <button class="menu-btn" onclick="startSession('objects3')">أسماء ٣ حروف</button>
        <button class="menu-btn" onclick="startSession('words4')">كلمات ٤ حروف</button>
        <button class="menu-btn" onclick="startSession('all')">كل المجموعات</button>
    </div>
</div>

<div id="game-screen">
    <div class="header-info" id="mode-info">اضغط على الكلمة لسماعها</div>
    <div class="word-display fade-in" id="main-word" onclick="handleWordInteraction()">...</div>
    <div class="footer-nav">
        <button class="btn-back" onclick="showMenu()">العودة للقائمة الرئيسية</button>
    </div>
</div>

    let currentList = [];
    let currentIndex = 0;

    function showMenu() {
        document.getElementById('menu-screen').style.display = 'flex';
        document.getElementById('game-screen').style.display = 'none';
        window.speechSynthesis.cancel();
    }

    function startSession(type) {
        if (type === 'all') {
            currentList = [...sessions.actions, ...sessions.objects3, ...sessions.words4];
        } else {
            currentList = [...sessions[type]];
        }
        currentList.sort(() => Math.random() - 0.5);
        currentIndex = 0;
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        displayWord();
    }

    function displayWord() {
        const wordElement = document.getElementById('main-word');
        wordElement.innerText = currentList[currentIndex].text; // عرض الكلمة بدون تشكيل
        wordElement.classList.remove('fade-in');
        void wordElement.offsetWidth;
        wordElement.classList.add('fade-in');
    }

    function handleWordInteraction() {
        speak(currentList[currentIndex].audio); // نطق الكلمة المشكلة والمشكنة الأواخر
        setTimeout(() => {
            currentIndex++;
            if (currentIndex >= currentList.length) {
                currentList.sort(() => Math.random() - 0.5);
                currentIndex = 0;
            }
            displayWord();
        }, 1300); 
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ar-SA';
        msg.rate = 0.65; 
        window.speechSynthesis.speak(msg);
    }

</html>
